name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: callforce
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: callforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: ./apps/api
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Scan secrets with TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified

    - name: Run Safety Check
      working-directory: ./apps/api
      run: safety check --bare || echo "Safety found vulnerabilities but proceeding"

    - name: Run Tests
      working-directory: ./apps/api
      env:
        DATABASE_URL: "postgresql+psycopg://callforce:supersecret@localhost:5432/callforce"
        REDIS_URL: "redis://localhost:6379/0"
        QDRANT_URL: "http://localhost:6333"
        APP_ENV: "test"
        ACCESS_TOKEN_SECRET: "testsecret"
      run: |
        python -m pytest tests/ -v

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint --workspace apps/web

