name: QA foundation

on:
  pull_request:
  push:
    branches:
      - devin/**

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.7.9"

jobs:
  quality-gates:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - lint
          - typecheck
          - test
          - build
          - audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install dependencies
        run: make install
      - name: Run ${{ matrix.check }}
        run: make ${{ matrix.check }}

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pre-commit
        run: python -m pip install pre-commit==4.6.0
      - name: Run hooks
        run: make pre-commit

  operational-runbooks:
    name: operational runbook skeletons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate docker compose file
        run: make compose-config
      - name: Validate runbook scripts without secrets
        run: |
          make backup-restore-drill DRILL_ARGS=--dry-run
          make migration-dry-run DRILL_ARGS=--dry-run
          make smoke-check DRILL_ARGS=--dry-run
