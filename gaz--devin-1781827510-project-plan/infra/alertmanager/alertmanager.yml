global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

receivers:
  - name: 'default'
    # Configure a real receiver (Slack, Telegram, email) via ALERT_RECEIVER_* env.
    # Until then, alerts are only visible in the Alertmanager UI.
    webhook_configs:
      - url: 'http://api:8000/api/v1/health'
        send_resolved: true
